name: regenerate profile svgs

on:
  push:
    paths:
      - profile-config.json
      - generate-profile.mjs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: generate about and experience svgs
        run: node generate-profile.mjs

      - name: commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- about.svg experience.svg; then
            git add about.svg experience.svg
            git commit -m "chore: regenerate profile svgs from config"
            git push
          fi
