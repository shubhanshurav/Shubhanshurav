<svg width="900" height="250" viewBox="0 0 900 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .fade1 { opacity: 0; animation: fadeIn 0.4s ease 0.4s forwards; }
    .fade2 { opacity: 0; animation: fadeIn 0.5s ease 1.0s forwards; }
    .fade3 { opacity: 0; animation: fadeIn 0.5s ease 1.6s forwards; }
    .fade4 { opacity: 0; animation: fadeIn 0.4s ease 2.2s forwards; }
    .cursor { animation: blink 1.1s step-end infinite; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>

  <rect x="1" y="1" width="898" height="248" rx="14" fill="#0D1117" stroke="#00FF9C" stroke-opacity="0.35" stroke-width="1.5"/>

